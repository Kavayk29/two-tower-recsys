data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  min_interactions: 5
  min_rating: 4.0
  test_frac: 0.1
  val_frac: 0.1
  max_samples_per_user: 50

features:
  text_embed_model: "sentence-transformers/all-MiniLM-L6-v2"
  text_embed_dim: 384
  max_history_len: 50

model:
  embedding_dim: 128
  user_hidden_dims: [256, 128]
  item_hidden_dims: [256, 128]
  dropout: 0.2
  temperature: 0.1
  attention_heads: 4
  attention_layers: 2
training:
  batch_size: 256
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.00001
  num_workers: 0
  logq_correction: false

retrieval:
  top_k_candidates: 500
  faiss_index_type: "IVF"
  nlist: 50
  nprobe: 10

mlflow:
  experiment_name: "two-tower-recsys"
  tracking_uri: "https://dagshub.com/Kavayk29/two-tower-recsys.mlflow"

serving:
  host: "0.0.0.0"
  port: 8000
  cold_start_threshold: 3